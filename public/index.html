<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>Socii MK1</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <main class="app-shell">
      <header class="masthead">
        <div class="brand-lockup">
          <p class="eyebrow">MK1</p>
          <h1>Socii</h1>
        </div>

        <div class="control-dock">
          <label class="field compact-field">
            <span>Role</span>
            <select id="role-select">
              <option value="javi">Javi</option>
              <option value="sofi">Sofi</option>
            </select>
          </label>

          <div class="control-buttons">
            <button id="join-button" class="primary-button control-button">Join Socii</button>
            <button id="resume-audio-button" class="ghost-button control-button" type="button">Resume Audio</button>
          </div>
        </div>
      </header>

      <section class="playground">
        <section class="orb-stage">
          <button id="partner-orb-button" class="partner-orb-button" type="button" disabled aria-label="Socii orb">
            <div id="partner-orb" class="partner-orb orb-offline"></div>
          </button>

          <div class="orb-copy">
            <p id="partner-status-label" class="partner-status-label">Offline</p>
            <p id="presence-summary" class="presence-pill">No pending talk request.</p>
            <p id="status-message" class="status-message">Choose role and join.</p>
          </div>

          <audio id="remote-audio" autoplay playsinline></audio>
        </section>

        <section class="note-station">
          <div class="note-station-shell">
            <div class="panel-header note-header">
              <h2>Small Notes</h2>
            </div>

            <div id="kaomoji-row" class="kaomoji-row">
              <div class="kaomoji-grid">
                <button class="kaomoji-chip" type="button" data-kaomoji="(◕‿◕)">(◕‿◕)</button>
                <button class="kaomoji-chip" type="button" data-kaomoji="(˘▾˘)">(˘▾˘)</button>
                <button class="kaomoji-chip" type="button" data-kaomoji="(˶ˆᗜˆ˵)">(˶ˆᗜˆ˵)</button>
                <button class="kaomoji-chip" type="button" data-kaomoji="(っ˘ω˘ς )">(っ˘ω˘ς )</button>
                <button class="kaomoji-chip" type="button" data-kaomoji="(｡•̀ᴗ-)✧">(｡•̀ᴗ-)✧</button>
                <button class="kaomoji-chip" type="button" data-kaomoji="(╥﹏╥)">(╥﹏╥)</button>
                <button class="kaomoji-chip" type="button" data-kaomoji="ヽ(・∀・)ﾉ">ヽ(・∀・)ﾉ</button>
                <button class="kaomoji-chip" type="button" data-kaomoji="(づ｡◕‿‿◕｡)づ">(づ｡◕‿‿◕｡)づ</button>
                <button class="kaomoji-chip" type="button" data-kaomoji="(｡･ω･｡)">(｡･ω･｡)</button>
                <button class="kaomoji-chip" type="button" data-kaomoji="( •⌄• ू )✧">( •⌄• ू )✧</button>
                <button class="kaomoji-chip" type="button" data-kaomoji="(๑˃ᴗ˂)ﻭ">(๑˃ᴗ˂)ﻭ</button>
                <button class="kaomoji-chip" type="button" data-kaomoji="(￣▽￣)ノ">(￣▽￣)ノ</button>
                <button class="kaomoji-chip" type="button" data-kaomoji="(｡•́︿•̀｡)">(｡•́︿•̀｡)</button>
                <button class="kaomoji-chip" type="button" data-kaomoji="(づ￣ ³￣)づ">(づ￣ ³￣)づ</button>
                <button class="kaomoji-chip" type="button" data-kaomoji="( ﾟ▽ﾟ)/">( ﾟ▽ﾟ)/</button>
                <button class="kaomoji-chip" type="button" data-kaomoji="(•‿•)">(•‿•)</button>
              </div>
            </div>

            <div class="custom-note-row">
              <div class="field field-full">
                <span>Received</span>
                <div id="note-composer-display" class="note-composer-display"></div>
                <p id="latest-received-meta" class="note-meta"></p>
              </div>
              <div class="note-action-row">
                <button id="clear-note-button" class="ghost-button" type="button" disabled>Clear</button>
                <button id="send-note-button" class="primary-button" type="button" disabled>Send Note</button>
              </div>
            </div>
          </div>
        </section>
      </section>

      <section id="debug-panel" class="debug-panel">
        <div class="panel-header">
          <h2>Debug State</h2>
        </div>
        <dl id="debug-state" class="debug-grid"></dl>
      </section>
    </main>

    <script src="/app.js"></script>
  </body>
</html>
